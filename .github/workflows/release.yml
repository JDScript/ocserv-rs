name: Release DEB Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-amd64:
    name: Build AMD64 DEB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build and Package (AMD64)
        run: cargo deb --target x86_64-unknown-linux-gnu --output target/x86_64-unknown-linux-gnu/debian/ocserv-rs_amd64.deb

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocserv-rs_amd64.deb
          path: target/x86_64-unknown-linux-gnu/debian/*.deb

  build-arm64:
    name: Build ARM64 DEB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross
        run: cargo install cross

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Cross Build (ARM64)
        run: cross build --release --target aarch64-unknown-linux-gnu

      - name: Package (ARM64)
        # We start a dummy build just to let cargo-deb find the binaries we already built with cross
        # Or better: use --no-build and manual directory structure? 
        # cargo-deb has --no-build flag but expects binaries in target/release usually.
        # But we built in target/aarch64-unknown-linux-gnu/release.
        # So we use cargo deb --target...
        # Since we are on x86, we can't run the build locally without cross.
        # cargo-deb calls 'cargo build'.
        # Solution: Use cargo-deb with --no-build and ensure binaries are in place.
        run: |
          cargo deb --no-build --target aarch64-unknown-linux-gnu --output target/aarch64-unknown-linux-gnu/debian/ocserv-rs_arm64.deb

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocserv-rs_arm64.deb
          path: target/aarch64-unknown-linux-gnu/debian/*.deb

  release:
    name: Create GitHub Release
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ocserv-rs_amd64.deb
          path: release_assets/

      - uses: actions/download-artifact@v4
        with:
          name: ocserv-rs_arm64.deb
          path: release_assets/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release_assets/*.deb
          generate_release_notes: true
